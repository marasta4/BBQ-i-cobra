<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="I Cobra BBQ">
<meta name="theme-color" content="#0f0d0b">
<title>I Cobra BBQ — Competition Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght=300;400;500&family=DM+Mono:wght=400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --pit: #0f0d0b;
  --pit2: #1a1612;
  --pit3: #252018;
  --pit4: #2e2820;
  --ember: #e8460a;
  --ember2: #f97316;
  --ember3: #fbbf24;
  --smoke: #6b6560;
  --smoke2: #9b948d;
  --smoke3: #ccc5bc;
  --bone: #f5f0e8;
  --bone2: #e8e0d0;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --r: 6px;
  font-family: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--pit);
  color: var(--bone);
  font-size: 14px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* Spostato qui lo sfondo per evitare il bug del touch block su iOS/iPadOS */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px);
  pointer-events: none;
  z-index: 0;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* SCREENS */
.screen { display: none; flex-direction: column; flex: 1; position: relative; z-index: 1; }
.screen.active { display: flex; }

/* TOPBAR */
.topbar {
  padding: 14px 16px 10px;
  padding-top: max(14px, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  background: var(--pit2);
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--bone); flex: 1; line-height: 1; }
.topbar-sub { font-size: 10px; color: var(--smoke2); letter-spacing: 1px; text-transform: uppercase; display: block; font-weight: 300; }
.live-badge { background: var(--ember); color: #fff; font-size: 11px; font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 4px; letter-spacing: .5px; font-weight: 500; }
.bell-btn { background: none; border: none; color: var(--smoke2); cursor: pointer; font-size: 20px; padding: 4px; line-height: 1; }
.back-btn { background: none; border: none; color: var(--smoke2); cursor: pointer; font-size: 20px; padding: 2px; line-height: 1; }

/* TABS */
.tabs { display: flex; background: var(--pit2); border-bottom: 1px solid rgba(255,255,255,.06); position: sticky; top: 57px; z-index: 40; }
.tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 11px; letter-spacing: .8px; text-transform: uppercase; cursor: pointer; color: var(--smoke); border-bottom: 2px solid transparent; transition: all .2s; font-weight: 500; }
.tab.active { color: var(--ember2); border-bottom-color: var(--ember2); }

/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 14px 14px 90px; -webkit-overflow-scrolling: touch; }

/* SECTION LABEL */
.sec { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--smoke); margin: 16px 0 8px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.sec::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.06); }
.sec:first-child { margin-top: 4px; }

/* CARDS */
.card { background: var(--pit2); border: 1px solid rgba(255,255,255,.08); border-radius: var(--r); padding: 12px 14px; margin-bottom: 8px; transition: border-color .2s; }
.card:hover { border-color: rgba(255,255,255,.14); }
.card.urgent { border-left: 3px solid var(--red); background: rgba(239,68,68,.07); border-radius: 0 var(--r) var(--r) 0; }
.card.active-step { border-left: 3px solid var(--ember2); border-radius: 0 var(--r) var(--r) 0; }
.card.upcoming { border-left: 3px solid rgba(255,255,255,.12); border-radius: 0 var(--r) var(--r) 0; }
.card.done-card { opacity: .38; }

.card-row { display: flex; align-items: flex-start; gap: 10px; }
.card-time { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--ember2); min-width: 42px; font-weight: 500; padding-top: 1px; }
.card-title { font-size: 14px; font-weight: 500; flex: 1; line-height: 1.35; color: var(--bone); }
.done-icon { font-size: 18px; cursor: pointer; color: var(--smoke); padding: 2px; transition: color .15s; flex-shrink: 0; }
.done-icon.checked { color: var(--green); }

/* PILLS */
.pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.pill { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; letter-spacing: .4px; text-transform: uppercase; }
.p-chicken { background: rgba(59,130,246,.2); color: #93c5fd; }
.p-ribs { background: rgba(239,68,68,.2); color: #fca5a5; }
.p-pork { background: rgba(34,197,94,.2); color: #86efac; }
.p-brisket { background: rgba(251,191,36,.2); color: #fde68a; }
.p-person { background: rgba(255,255,255,.07); color: var(--smoke2); border: 0.5px solid rgba(255,255,255,.1); }
